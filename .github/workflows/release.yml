name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run typecheck && npm run lint && npm run test

      # On every push to main: if there are pending changesets, open/update a
      # "Version Packages" PR that bumps package.json and writes CHANGELOG.md.
      # Once that PR is merged (so there are no pending changesets left on
      # this run), this step instead runs `npm run release`, which builds and
      # publishes to npm.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npm run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node's registry-url makes `npm publish` read NODE_AUTH_TOKEN.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
